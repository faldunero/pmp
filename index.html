<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PMP Simulator Pro | Executive Training</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pmi-blue: #0f172a; --accent: #2563eb; --success: #10b981; 
            --error: #ef4444; --bg: #f8fafc; --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; justify-content: center; padding: 40px 20px; color: #1e293b; }
        .main-container { width: 100%; max-width: 950px; background: white; border-radius: 32px; padding: 60px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; position: relative; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .auth-card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        h1 { font-size: 2.5rem; font-weight: 800; color: var(--pmi-blue); margin-bottom: 8px; text-align: center; }
        .btn-featured { width: 100%; background: var(--pmi-blue); color: white; border: none; font-size: 1rem; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: 20px; transition: 0.3s; }
        .btn-featured:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-option { background: white; border: 1.5px solid #e2e8f0; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; color: #334155; width: 100%; text-align: center; }
        
        #quiz-area, #report-area, #break-area, #home-screen { display: none; }
        .timer-pill { background: #f1f5f9; padding: 8px 16px; border-radius: 100px; font-weight: 700; font-family: monospace; }
        .ans-card { border: 1.5px solid #e2e8f0; padding: 18px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .ans-card.selected { border-color: var(--accent); background: #eff6ff; color: var(--accent); font-weight: 600; }
        
        .input-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; font-size: 1rem; outline: none; }
        .input-field:focus { border-color: var(--accent); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div id="login-step">
            <h2>PMP Simulator</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Identifícate para acceder al simulador profesional</p>
            <button class="btn-featured" onclick="loginConGoogle()" style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Entrar con Google
            </button>
        </div>
        <div id="register-step" style="display:none;">
            <h2>Perfil de Alumno</h2>
            <p style="color: #64748b; margin-bottom: 20px;">Completa tus datos para el historial</p>
            <select id="reg-sexo" class="input-field">
                <option value="">Selecciona Género</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Otro</option>
            </select>
            <input type="text" id="reg-direccion" class="input-field" placeholder="Dirección de contacto">
            <button class="btn-featured" onclick="guardarPerfilExtra()">Finalizar y Entrar</button>
        </div>
    </div>
</div>

<div class="main-container">
    <div id="home-screen">
        <h1>PMP Simulator Pro</h1>
        <p style="text-align:center; color:#64748b; margin-bottom: 40px;">Panel de Entrenamiento para Certificación PMP®</p>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
            <button class="btn-option" onclick="empezar(20)">Práctica 20</button>
            <button class="btn-option" onclick="empezar(60)">Práctica 60</button>
            <button class="btn-featured" style="grid-column: 1 / -1; margin-top: 0;" onclick="empezar(180)">SIMULACRO COMPLETO (180 p.)</button>
        </div>
        
        <div id="user-display" style="text-align:center; font-size: 0.85rem; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 20px;"></div>
    </div>

    <div id="quiz-area">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div id="reloj-digital" class="timer-pill">00:00:00</div>
            <div id="progreso-txt" style="font-weight: 800; color: var(--pmi-blue);">PREGUNTA 1</div>
            <button onclick="limpiarSesion()" style="color:var(--error); background:none; border:none; font-weight:700; cursor:pointer;">Abandonar</button>
        </div>
        <div id="texto-enunciado" style="font-size: 1.4rem; font-weight: 600; line-height: 1.4; margin-bottom: 35px;"></div>
        <div id="contenedor-opciones"></div>
        <div style="display: flex; justify-content: space-between; margin-top: 40px;">
            <button onclick="mover(-1)" class="btn-option" style="width: auto; padding: 12px 30px;">Anterior</button>
            <button id="btn-next" onclick="mover(1)" class="btn-featured" style="width: auto; padding: 12px 45px; margin:0;">Siguiente</button>
        </div>
    </div>

    <div id="report-area">
        <div style="text-align: center; margin-bottom: 40px;">
            <p style="color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;">Resultado del Examen</p>
            <h2 id="report-score" style="font-size: 5rem; margin:10px 0;">0%</h2>
            <div id="report-status" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 20px;"></div>
        </div>
        <button class="btn-featured" onclick="limpiarSesion()">Volver al Panel Principal</button>
        <div id="report-review" style="margin-top: 40px;"></div>
    </div>
</div>

<script>
    // CREDENCIALES INTEGRADAS COMPLETAS
    const firebaseConfig = {
        apiKey: "AIzaSyB3F_S-4wI_4vR4_7yV0z4Q9z_L8z1_8z1", // Asegúrate de que esta sea tu llave real
        authDomain: "pmp-simulator-pro-c656a.firebaseapp.com",
        projectId: "pmp-simulator-pro-c656a",
        storageBucket: "pmp-simulator-pro-c656a.appspot.com",
        messagingSenderId: "367245844436",
        appId: "1:367245844436:web:647245844436f4d8e5f2" // Asegúrate de que esta sea tu ID real
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const API_URL = "https://us-central1-pmp-simulator-pro-c656a.cloudfunctions.net/getQuestions";

    let qSet = JSON.parse(localStorage.getItem('pmp_qSet')) || [];
    let idx = parseInt(localStorage.getItem('pmp_idx')) || 0;
    let userChoices = JSON.parse(localStorage.getItem('pmp_userChoices')) || {};
    let segs = parseInt(localStorage.getItem('pmp_segs')) || 0;
    let timer;

    auth.onAuthStateChanged(async (user) => {
        const overlay = document.getElementById('auth-overlay');
        if (user) {
            const doc = await db.collection("usuarios").doc(user.uid).get();
            if (doc.exists) {
                overlay.style.display = 'none';
                document.getElementById('home-screen').style.display = 'block';
                document.getElementById('user-display').innerText = `Conectado como: ${user.email}`;
                if (qSet.length > 0) empezar(qSet.length);
            } else {
                document.getElementById('login-step').style.display = 'none';
                document.getElementById('register-step').style.display = 'block';
                overlay.style.display = 'flex';
            }
        } else {
            overlay.style.display = 'flex';
            document.getElementById('home-screen').style.display = 'none';
        }
    });

    function loginConGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert("Error de conexión: " + e.message));
    }

    async function guardarPerfilExtra() {
        const user = auth.currentUser;
        const sexo = document.getElementById('reg-sexo').value;
        const dir = document.getElementById('reg-direccion').value;
        if(!sexo || !dir) return alert("Por favor, completa los campos.");

        await db.collection("usuarios").doc(user.uid).set({
            nombre: user.displayName.split(' ')[0],
            apellido: user.displayName.split(' ').slice(1).join(' '),
            email: user.email,
            sexo: sexo,
            direccion: dir,
            fecha_registro: firebase.firestore.FieldValue.serverTimestamp(),
            uid: user.uid
        });
        location.reload();
    }

    async function empezar(n) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';

        if (qSet.length === 0) {
            try {
                const res = await fetch(API_URL);
                const all = await res.json();
                qSet = all.sort(() => 0.5 - Math.random()).slice(0, n);
                localStorage.setItem('pmp_qSet', JSON.stringify(qSet));
            } catch(e) { alert("Error al cargar preguntas"); return; }
        }
        iniciarReloj();
        dibujar();
    }

    function iniciarReloj() {
        if(timer) clearInterval(timer);
        timer = setInterval(() => { 
            segs++; 
            localStorage.setItem('pmp_segs', segs);
            document.getElementById('reloj-digital').innerText = new Date(segs * 1000).toISOString().substr(11, 8);
        }, 1000);
    }

    function dibujar() {
        if(!qSet.length) return;
        const p = qSet[idx];
        localStorage.setItem('pmp_idx', idx);
        document.getElementById('texto-enunciado').innerText = p.enunciado;
        document.getElementById('progreso-txt').innerText = `PREGUNTA ${idx+1} / ${qSet.length}`;
        const c = document.getElementById('contenedor-opciones');
        c.innerHTML = '';
        ['A', 'B', 'C', 'D'].forEach(l => {
            if (p.opciones[l]) {
                const d = document.createElement('div');
                d.className = `ans-card ${userChoices[idx] === l ? 'selected' : ''}`;
                d.innerText = `${l}. ${p.opciones[l]}`;
                d.onclick = () => { 
                    userChoices[idx] = l; 
                    localStorage.setItem('pmp_userChoices', JSON.stringify(userChoices)); 
                    dibujar(); 
                };
                c.appendChild(d);
            }
        });
        document.getElementById('btn-next').innerText = idx === qSet.length - 1 ? "Finalizar Examen" : "Siguiente";
    }

    function mover(d) {
        if(idx + d >= 0 && idx + d < qSet.length) { idx += d; dibujar(); }
        else if(idx + d >= qSet.length) finalizado();
    }

    async function finalizado() {
        clearInterval(timer);
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('report-area').style.display = 'block';
        let buenas = 0;
        qSet.forEach((q, i) => { if(userChoices[i] === q.respuesta_correcta) buenas++; });
        const score = Math.round((buenas / qSet.length) * 100);
        const tiempoTotal = document.getElementById('reloj-digital').innerText;
        const user = auth.currentUser;
        try {
            await db.collection("historial_examenes").add({
                uid: user.uid,
                email: user.email,
                fecha: firebase.firestore.FieldValue.serverTimestamp(),
                puntaje: score,
                preguntas_totales: qSet.length,
                tiempo: tiempoTotal
            });
        } catch(e) { console.error("Error guardando historial", e); }
        document.getElementById('report-score').innerText = `${score}%`;
        document.getElementById('report-status').innerText = score >= 70 ? "ESTADO: APROBADO" : "ESTADO: REQUIERE MÁS PRÁCTICA";
        document.getElementById('report-score').style.color = score >= 70 ? 'var(--success)' : 'var(--error)';
    }

    function limpiarSesion() {
        if(confirm("¿Estás seguro?")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
