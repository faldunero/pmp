<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PMP Simulator Pro | Executive Training</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pmi-blue: #0f172a; --accent: #2563eb; --bg: #f8fafc; 
        }
        body { background-color: var(--bg); margin: 0; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 40px 20px; }
        .main-container { width: 100%; max-width: 950px; background: white; border-radius: 32px; padding: 60px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* PANTALLA DE LOGÍN (OCULTA EL RESTO) */
        #login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        #simulador-completo { display: none; }

        .btn-google { 
            display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #dadce0; 
            padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        
        /* Estilos de tu simulador original */
        h1 { font-size: 2.5rem; color: var(--pmi-blue); }
        .btn-option { background: white; border: 1.5px solid #e2e8f0; padding: 20px; border-radius: 16px; cursor: pointer; font-weight: 700; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 20px; }
        #quiz-area, #report-area { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    
    <div id="login-screen">
        <h1>PMP Simulator Pro</h1>
        <p>Inicia sesión con tu cuenta autorizada para practicar.</p>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continuar con Google
        </button>
    </div>

    <div id="simulador-completo">
        <div id="home-screen">
            <h1>Bienvenido al Simulador</h1>
            <div class="menu-grid">
                <button class="btn-option" onclick="empezar(20)">Práctica 20</button>
                <button class="btn-option" onclick="empezar(60)">Práctica 60</button>
                <button class="btn-option" onclick="logout()" style="color:red">Cerrar Sesión</button>
            </div>
        </div>

        <div id="quiz-area">
            <h2 id="texto-enunciado">Cargando pregunta...</h2>
            <div id="contenedor-opciones"></div>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN (CON AUTHDOMAIN PARA QUE NO DE ERROR)
    const firebaseConfig = { 
        apiKey: "AIzaSyBnd8g4h0-H9IsSWH4TciiZ5LgJJhmtqis",
        authDomain: "pmp-simulator-pro-c656a.firebaseapp.com",
        projectId: "pmp-simulator-pro-c656a" 
    };
 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // Lógica de Login
    function login() {
        auth.signInWithPopup(provider).catch(err => {
            console.error(err);
            alert("Error: Verifica que faldunero.github.io esté en la lista de dominios de Firebase.");
        });
    }

    function logout() { auth.signOut(); }

    // EL GUARDIÁN DE LA PÁGINA
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('simulador-completo').style.display = 'block';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('simulador-completo').style.display = 'none';
        }
    });

    // --- AQUÍ VA TU LÓGICA DE PREGUNTAS (Sigue igual que antes) ---
    async function empezar(n) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        const snap = await db.collection('preguntas_pmp').get();
        // ... (resto de tu lógica de Firestore)
    }
</script>
</body>
</html>
