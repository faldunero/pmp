<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Simulator Pro | Executive Training</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pmi-blue: #0f172a; --accent: #2563eb; --bg: #f8fafc; 
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; justify-content: center; padding: 40px 20px; color: #1e293b; }
        .main-container { width: 100%; max-width: 950px; background: white; border-radius: 32px; padding: 60px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; min-height: 500px; }
        
        #login-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; }
        .btn-google { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #dadce0; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        
        #simulador-wrapper { display: none; }
        h1 { font-size: 3rem; font-weight: 800; color: var(--pmi-blue); text-align: center; margin-bottom: 8px; letter-spacing: -0.04em; }
        .subtitle { text-align: center; color: #64748b; font-size: 1.2rem; margin-bottom: 40px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .btn-option { background: white; border: 1.5px solid #e2e8f0; padding: 20px; border-radius: 16px; font-weight: 700; cursor: pointer; color: #334155; transition: 0.2s; }
        .btn-option:hover { border-color: var(--accent); background: #f0f7ff; }
        .btn-featured { grid-column: 1 / -1; background: var(--pmi-blue); color: white; border: none; font-size: 1.1rem; padding: 24px; border-radius: 16px; cursor: pointer; font-weight: 700; }
        
        #quiz-area { display: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .timer-pill { background: #f1f5f9; padding: 8px 16px; border-radius: 100px; font-weight: 700; font-family: monospace; }
        .progress-rail { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; margin-bottom: 40px; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; width: 0%; transition: 0.5s; }
        
        .question-text { font-size: 1.6rem; font-weight: 600; color: #0f172a; margin-bottom: 40px; }
        .ans-card { border: 1.5px solid #e2e8f0; padding: 22px; border-radius: 18px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .ans-card:hover { border-color: #cbd5e1; }
        .ans-card.selected { border-color: var(--accent); background: #eff6ff; color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="login-overlay">
        <h1>PMP Simulator Pro</h1>
        <p>Identifícate para acceder a tu entrenamiento ejecutivo</p>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continuar con Google
        </button>
    </div>

    <div id="simulador-wrapper">
        <div id="home-screen">
            <h1>PMP Simulator Pro</h1>
            <p class="subtitle">Simulador basado en estándares PMI®</p>
            <div class="menu-grid">
                <button class="btn-option" onclick="empezar(20)">Práctica 20</button>
                <button class="btn-option" onclick="empezar(60)">Práctica 60</button>
                <button class="btn-featured" onclick="empezar(180)">MODO EXAMEN COMPLETO (180 p.)</button>
            </div>
            <p style="text-align:center; margin-top:30px;">
                <a href="#" onclick="logout()" style="color:#64748b; font-size:0.9rem;">Cerrar sesión</a>
            </p>
        </div>

        <div id="quiz-area">
            <div class="top-bar">
                <button onclick="location.reload()" style="background:#fee2e2; color:#ef4444; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:700;">Salir</button>
                <div id="progreso-txt" style="font-weight: 800;">PREGUNTA 1 / --</div>
                <div class="timer-pill" id="reloj-digital">00:00:00</div>
            </div>
            <div class="progress-rail"><div class="progress-fill" id="p-bar"></div></div>
            <div id="texto-enunciado" class="question-text"></div>
            <div id="contenedor-opciones"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 40px;">
                <button onclick="mover(-1)" style="padding: 15px 30px; border-radius: 12px; border:1px solid #e2e8f0; cursor:pointer; font-weight:600;">Anterior</button>
                <button id="btn-next" onclick="mover(1)" style="padding: 15px 40px; border-radius: 12px; background:var(--accent); color:white; border:none; cursor:pointer; font-weight:700;">Siguiente</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Configuración de Firebase
    const firebaseConfig = {
    apiKey: "AIzaSyCljxMJ1837p-rN7Husua5jgVLr9MRi_Fg",
    authDomain: "pmp-simulator-pro-c656a.firebaseapp.com",
    projectId: "pmp-simulator-pro-c656a",
    storageBucket: "pmp-simulator-pro-c656a.appspot.com",
    messagingSenderId: "574994878534",
    appId: "1:574994878534:web:e00f576e27163f454a8677"
    };

    // 2. Inicialización
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // 3. Gestión de la Interfaz y Autenticación
    auth.onAuthStateChanged(user => {
        const loginUI = document.getElementById('login-overlay');
        const appUI = document.getElementById('simulador-wrapper');
        if (user) {
            loginUI.style.display = 'none';
            appUI.style.display = 'block';
        } else {
            loginUI.style.display = 'flex';
            appUI.style.display = 'none';
        }
    });

    function login() {
        auth.signInWithPopup(provider).catch(err => {
            console.error(err);
            if(err.code === 'auth/configuration-not-found') {
                alert("Error: Asegúrate de darle a 'Guardar' en el proveedor de Google en la consola de Firebase.");
            } else {
                alert("Error de autenticación: " + err.message);
            }
        });
    }

    function logout() { auth.signOut(); }

    // 4. Lógica del Simulador
    let qSet = [], idx = 0, userChoices = {}, segs = 0, timer;

    async function empezar(n) {
        try {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            
            const snap = await db.collection('preguntas_pmp').get();
            if (snap.empty) throw new Error("No hay preguntas en la base de datos.");
            
            let all = snap.docs.map(d => d.data());
            qSet = all.sort(() => 0.5 - Math.random()).slice(0, n);
            
            iniciarReloj();
            dibujar();
        } catch (e) {
            alert("Error al iniciar: " + e.message);
            location.reload();
        }
    }

    function iniciarReloj() {
        if(timer) clearInterval(timer);
        timer = setInterval(() => { 
            segs++; 
            const h = Math.floor(segs / 3600).toString().padStart(2, '0');
            const m = Math.floor((segs % 3600) / 60).toString().padStart(2, '0');
            const s = (segs % 60).toString().padStart(2, '0');
            document.getElementById('reloj-digital').innerText = `${h}:${m}:${s}`; 
        }, 1000);
    }

    function dibujar() {
        const p = qSet[idx];
        document.getElementById('texto-enunciado').innerText = p.enunciado;
        document.getElementById('progreso-txt').innerText = `PREGUNTA ${idx+1} / ${qSet.length}`;
        document.getElementById('p-bar').style.width = `${((idx+1)/qSet.length)*100}%`;
        
        const c = document.getElementById('contenedor-opciones');
        c.innerHTML = '';
        
        ['A', 'B', 'C', 'D'].forEach(l => {
            if(p.opciones && p.opciones[l]) {
                const d = document.createElement('div');
                d.className = `ans-card ${userChoices[idx] === l ? 'selected' : ''}`;
                d.innerText = `${l}. ${p.opciones[l]}`;
                d.onclick = () => { userChoices[idx] = l; dibujar(); };
                c.appendChild(d);
            }
        });
        
        document.getElementById('btn-next').innerText = idx === qSet.length - 1 ? "Finalizar" : "Siguiente";
    }

    function mover(d) {
        if(idx + d >= 0 && idx + d < qSet.length) { 
            idx += d; 
            dibujar(); 
        } else if(idx + d >= qSet.length) {
            alert("¡Has terminado la sesión de práctica!");
            location.reload();
        }
    }
</script>

</body>
</html>
